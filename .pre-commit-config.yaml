# Pre-commit hooks configuration
# Install: pre-commit install && pre-commit install --hook-type pre-push
# Run manually: pre-commit run --all-files

repos:
  # General file checks (fast, run on commit)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
        args: ["--unsafe"] # Allow custom tags
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  # Go linting with golangci-lint
  # 版本须与 CI (.github/workflows/test.yml 的 golangci-lint-action) 保持一致，
  # 否则会出现"本地通过、CI 报错"的情况（不同版本的 linter 规则/阈值会变化）。
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.1
    hooks:
      - id: golangci-lint
        args:
          - --fix
          - --timeout=5m
          - --build-tags=ci
          - --config=.golangci.yml
        pass_filenames: false

  # Go formatting and imports
  - repo: local
    hooks:
      - id: go-mod-tidy
        name: Tidy Go modules
        entry: go mod tidy
        language: system
        pass_filenames: false

      - id: goimports
        name: Format Go imports
        entry: goimports -w -local github.com/palemoky/fight-the-landlord
        language: system
        types: [go]
        exclude: '(internal/protocol/pb/.*\.pb\.go|internal/protocol/convert/msgtype/mapping\.go)$'

      - id: gofumpt
        name: Format Go code
        entry: gofumpt -w
        language: system
        types: [go]
        exclude: '(internal/protocol/pb/.*\.pb\.go|internal/protocol/convert/msgtype/mapping\.go)$'

      # Build verification (catch compilation errors early)
      - id: go-build
        name: Verify Go build
        entry: bash -c 'go build -v ./...'
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Go unit tests with coverage (heavy, run on push)
      - id: go-test
        name: Run Go unit tests
        entry: bash -c 'pkgs=$(go list ./internal/... | grep -v "/internal/ai$"); go test -race -shuffle=on -coverprofile=coverage.out -covermode=atomic $pkgs'
        language: system
        stages: [pre-push]
        pass_filenames: false
        verbose: true
